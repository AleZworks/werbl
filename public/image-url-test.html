<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Werbl URL Test</title>
  </head>
  <body style="display: grid; gap: 24px; padding: 24px; font-family: sans-serif;">
    <h1>Werbl URL Test</h1>
    <section>
      <h2>Data URL image</h2>
      <img id="dataImage" alt="data url test" width="160" height="120" />
    </section>
    <section>
      <h2>Blob URL image</h2>
      <img id="blobImage" alt="blob url test" width="160" height="120" />
    </section>
    <canvas id="source" width="160" height="120" hidden></canvas>
    <script>
      const canvas = document.querySelector('#source')
      const context = canvas.getContext('2d')
      context.fillStyle = '#1f5a45'
      context.fillRect(0, 0, canvas.width, canvas.height)
      context.fillStyle = '#f8fafc'
      context.fillRect(18, 18, 124, 62)
      context.fillStyle = '#59a782'
      context.fillRect(18, 76, 124, 20)
      context.fillStyle = '#eeb347'
      context.beginPath()
      context.arc(118, 38, 13, 0, Math.PI * 2)
      context.fill()

      document.querySelector('#dataImage').src = canvas.toDataURL('image/webp', 0.9)
      canvas.toBlob((blob) => {
        document.querySelector('#blobImage').src = URL.createObjectURL(blob)
      }, 'image/webp', 0.9)
    </script>
  </body>
</html>
